name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t nginx-app .

      - name: Push Image
        run: echo "Push to DockerHub (configure secrets)"

      - name: Trigger ArgoCD Sync
        run: echo "GitOps handles deployment automatically"